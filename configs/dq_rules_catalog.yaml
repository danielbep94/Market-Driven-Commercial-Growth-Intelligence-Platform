# ─────────────────────────────────────────────────────────────────────────────
# DATA_PROMO — Promotions
# ─────────────────────────────────────────────────────────────────────────────
DATA_PROMO:
  UPC:
    mandatory: false
    severity: HIGH
    column_type: pending_discovery
    canonical_name: SKU
    description: "Product UPC for promotion — may be at brand level"
  CADENA:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    description: "Retailer chain — promotions are customer-specific"
  FECHA_INICIO:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    description: "Promotion start date"
  FECHA_FIN:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    description: "Promotion end date — must be >= FECHA_INICIO"
  DESCUENTO_PCT:
    mandatory: false
    severity: HIGH
    column_type: pending_discovery
    value_range:
      min: 0
      max: 100
    description: "Discount percentage — must be between 0 and 100"

# ─────────────────────────────────────────────────────────────────────────────
# DATA_INVENTORY — Inventory / Stock
# STATUS: deprecated_replaced_by_SELL_OUT
# Business confirmed inventory comes from sell-out data (Q8).
# Inventory metrics are VOL_INV and PCS_INV in the SELL_OUT semantic layout.
# ─────────────────────────────────────────────────────────────────────────────
DATA_INVENTORY:
  _status: deprecated_replaced_by_SELL_OUT
  _replacement_source: SELL_OUT
  _replacement_columns:
    STOCK_UNITS: PCS_INV
    STOCK_VOLUME: VOL_INV
  _reason: "Business confirmed inventory comes from sell-out data."
  SKU:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    status: remapped_to_SELL_OUT
    note: "Now available as UPC in SELL_OUT layout (Q9 grain change)."
    description: "SKU — product join key for inventory"
  FECHA:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    status: remapped_to_SELL_OUT
    note: "FECHA exists in SELL_OUT layout."
    description: "Inventory snapshot date"
  STOCK_UNITS:
    mandatory: false
    severity: HIGH
    column_type: pending_discovery
    status: remapped_to_SELL_OUT
    note: "Maps to PCS_INV in SELL_OUT layout."
    value_range:
      min: 0
      max: 100000000
    description: "Stock on hand — must be non-negative (zero is valid)"

# ─────────────────────────────────────────────────────────────────────────────
# DATA_CALENDAR — Date Dimension
# ─────────────────────────────────────────────────────────────────────────────
DATA_CALENDAR:
  DATE_ID:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    unique: true
    description: "Primary key of calendar — must be unique and never null"
  YEAR:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    canonical_name: ANIO
    description: "Calendar year"
  MONTH:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    canonical_name: MES
    description: "Calendar month (1-12)"
  WEEK:
    mandatory: false
    severity: HIGH
    column_type: pending_discovery
    description: "ISO week number"
  IS_FISCAL:
    mandatory: false
    severity: LOW
    column_type: pending_discovery
    description: "Flag for fiscal vs calendar period alignment"
