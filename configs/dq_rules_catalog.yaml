# ─────────────────────────────────────────────────────────────────────────────
# DATA_SELL_OUT — Point-of-Sale / Consumer Sales
# ─────────────────────────────────────────────────────────────────────────────
DATA_SELL_OUT:
  UPC:
    mandatory: true
    severity: CRITICAL
    column_type: NUMBER(25,0)
    canonical_name: SKU
    description: "Product UPC — primary join key to product dimension"
  CHAIN:
    mandatory: true
    severity: CRITICAL
    column_type: TEXT(42)
    canonical_name: CADENA
    description: "Retailer chain — required for customer dimension join"
  DAY_ID:
    mandatory: true
    severity: CRITICAL
    column_type: NUMBER(38,0)
    canonical_name: FECHA
    description: "Transaction day surrogate key — required for time dimension join"
  VOL_SELL_OUT:
    mandatory: false
    severity: HIGH
    column_type: NUMBER(18,6)
    value_range:
      min: 0
      max: 50000000
    description: "Consumer sales volume in units — must be non-negative"
  PCS_SELL_OUT:
    mandatory: false
    severity: HIGH
    column_type: NUMBER(18,6)
    value_range:
      min: 0
      max: 50000000
    description: "Consumer sales in pieces — must be non-negative"
  SUBCHAIN:
    mandatory: false
    severity: MEDIUM
    column_type: TEXT(42)
    description: "Sub-chain / banner — used for granular retail analytics"
  FORMAT:
    mandatory: false
    severity: MEDIUM
    column_type: TEXT(46)
    allowed_values:
      - "HYPERMARKET"
      - "SUPERMARKET"
      - "CONVENIENCE"
      - "WHOLESALE"
      - "DRUGSTORE"
      - "ONLINE"
      - "OTHER"
    description: "Store format — must be a recognized value for segmentation"

# ─────────────────────────────────────────────────────────────────────────────
# DATA_SELL_IN — Factory / Distributor Shipments
# ─────────────────────────────────────────────────────────────────────────────
DATA_SELL_IN:
  SKU:
    mandatory: true
    severity: CRITICAL
    column_type: TEXT(26)
    description: "SKU — primary product join key for sell-in"
  INT_ID:
    mandatory: false
    severity: HIGH
    column_type: TEXT(38)
    canonical_name: SKU
    description: "Internal Danone product ID — join to product master"
  CADENA:
    mandatory: true
    severity: CRITICAL
    column_type: TEXT(16777216)
    description: "Customer/chain for sell-in transaction"
  FECHA:
    mandatory: true
    severity: CRITICAL
    column_type: DATE
    description: "Shipment date — required for temporal alignment"
  UNIDADES:
    mandatory: false
    severity: HIGH
    column_type: NUMBER(31,15)
    value_range:
      min: 0
      max: 10000000
    description: "Shipped units — must be non-negative"
  MONTO:
    mandatory: false
    severity: HIGH
    column_type: NUMBER(18,6)
    canonical_name: VALOR
    value_range:
      min: -1000000
      max: 100000000
    description: "Invoice amount — negatives allowed for returns/credits"

# ─────────────────────────────────────────────────────────────────────────────
# DATA_WASTE — Waste / Merma
# ─────────────────────────────────────────────────────────────────────────────
DATA_WASTE:
  SKU:
    mandatory: true
    severity: CRITICAL
    column_type: TEXT(16777216)
    description: "SKU identifier — required for product-level waste analytics"
  CADENA:
    mandatory: true
    severity: CRITICAL
    column_type: TEXT(16777216)
    description: "Customer chain — required for waste by retailer analytics"
  MARCA:
    mandatory: true
    severity: HIGH
    column_type: TEXT(16777216)
    description: "Brand — join key to brand dimension"
  FECHA:
    mandatory: true
    severity: CRITICAL
    column_type: DATE
    description: "Waste date — required for temporal alignment"
  UNIDADES_MERMA:
    mandatory: false
    severity: HIGH
    column_type: FLOAT
    value_range:
      min: 0
      max: 1000000
    description: "Waste units — must be non-negative; zero is valid (no waste)"

# ─────────────────────────────────────────────────────────────────────────────
# DATA_FORECAST — Demand Forecast
# STATUS: deprecated_replaced_by_IBP
# Business confirmed IBP is the forecast/planning source (Q7).
# These rules expect columns (SKU, FORECAST_UNITS, VERSION) that do not exist
# in the IBP semantic layout. Rules are blocked pending column remap.
# ─────────────────────────────────────────────────────────────────────────────
DATA_FORECAST:
  _status: deprecated_replaced_by_IBP
  _replacement_source: DATA_DANONE_IBP
  _reason: "Business confirmed IBP is the forecast/planning source. Keep source name as IBP."
  _blocked_reason: "Expected columns (SKU, FORECAST_UNITS, VERSION) do not match IBP layout columns (CICLO, CATEGORIA, FORMATO, IBP_AMOUNT, etc.)."
  SKU:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    status: blocked_pending_remap
    description: "SKU — must match sell-in SKU universe"
  CADENA:
    mandatory: false
    severity: HIGH
    column_type: pending_discovery
    status: blocked_pending_remap
    description: "Customer chain forecast target"
  FECHA:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    status: blocked_pending_remap
    note: "FECHA now exists in IBP layout — this rule could be remapped"
    description: "Forecast period date — required"
  FORECAST_UNITS:
    mandatory: true
    severity: HIGH
    column_type: pending_discovery
    status: blocked_pending_remap
    note: "IBP has IBP_AMOUNT (monetary), not FORECAST_UNITS. Cannot remap without business confirmation."
    value_range:
      min: 0
      max: 50000000
    description: "Forecasted units — must be non-negative"
  VERSION:
    mandatory: false
    severity: MEDIUM
    column_type: pending_discovery
    status: blocked_pending_remap
    description: "Forecast version identifier — used to select official version"

# ─────────────────────────────────────────────────────────────────────────────
# DATA_NIELSEN — Nielsen Market Share
# ─────────────────────────────────────────────────────────────────────────────
DATA_NIELSEN:
  CBU_CODE:
    mandatory: false
    severity: HIGH
    column_type: pending_discovery
    canonical_name: SKU
    description: "Nielsen product code — must be homologated to internal SKU/UPC"
  MARCA:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    description: "Brand — primary dimension for market share analysis"
  CATEGORIA:
    mandatory: true
    severity: HIGH
    column_type: pending_discovery
    description: "Category — required for competitive benchmarking"
  YEAR_ID:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    canonical_name: ANIO
    description: "Nielsen year period — required for temporal join"
  MARKET_SHARE:
    mandatory: false
    severity: HIGH
    column_type: pending_discovery
    value_range:
      min: 0
      max: 100
    description: "Market share % — must be between 0 and 100"

# ─────────────────────────────────────────────────────────────────────────────
# DATA_PRICE — Pricing
# ─────────────────────────────────────────────────────────────────────────────
DATA_PRICE:
  UPC:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    canonical_name: SKU
    description: "UPC — product join key for pricing"
  CHAIN:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    canonical_name: CADENA
    description: "Retailer chain — price varies by customer"
  FECHA:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    description: "Effective price date"
  PRECIO:
    mandatory: true
    severity: CRITICAL
    column_type: pending_discovery
    value_range:
      min: 0.01
      max: 100000
