# ─────────────────────────────────────────────────────────────────────────────
# Data Quality Rules Catalog — Enterprise Metadata Catalog
# Version: 2.0
# Purpose: Configurable DQ rules consumed by 00b_snowflake_discovery.py (Step 4).
#
# CRITICAL RULE: The top-level key in this file MUST EXACTLY MATCH the key used
# in the SOURCES dict in 00b_snowflake_discovery.py.
# Example: if the source is "DATA_MKT_ON" in SOURCES, the key here is DATA_MKT_ON.
# A mismatch causes Step 4 to silently find no rules (no error, no validation).
#
# ─────────────────────────────────────────────────────────────────────────────
# YAML STRUCTURE
# ─────────────────────────────────────────────────────────────────────────────
# Each source key contains a dict of column names.
# Each column dict contains:
#
#   severity:        CRITICAL | HIGH | MEDIUM | LOW
#                    Affects Step 9 readiness score and the icon shown in the report.
#                    CRITICAL  → integration blocked; readiness score -15 per failure
#                    HIGH      → integration conditional; readiness score -8
#                    MEDIUM    → monitoring alert only; readiness score -3
#                    LOW       → informational; no score impact
#
#   description:     (string) Human-readable explanation of the rule. Required for the
#                    business glossary and data contracts.
#
# Rule types (one or more per column — all are evaluated independently):
#
#   mandatory: true
#     The column must have 0% null values.
#     Applies even if the column is nullable in Snowflake.
#     FAIL if null_pct > 0.
#
#   allowed_values: [val1, val2, ...]
#     Every non-null value must appear in this explicit list.
#     Values are case-sensitive (match Snowflake storage casing exactly).
#     FAIL if any row contains a value outside the list.
#
#   value_range:
#     min: <number>     (optional — omit to skip lower-bound check)
#     max: <number>     (optional — omit to skip upper-bound check)
#     FAIL if any non-null value is < min or > max.
#     Note: null values are ignored (use mandatory: true to also check nulls).
#
#   unique: true
#     The column must be a primary key candidate:
#     distinct count == total row count AND null_pct == 0.
#     Uses results already computed in Step 2 — no extra Spark action.
#     FAIL if duplicates exist.
#
# ─────────────────────────────────────────────────────────────────────────────
# HOW RULES ARE APPLIED IN THE NOTEBOOK
# ─────────────────────────────────────────────────────────────────────────────
# Step 4 in 00b_snowflake_discovery.py:
#   1. Loads this file: DQ_RULES = yaml.safe_load(...)
#   2. Looks up the current source: source_rules = DQ_RULES.get(source_key, {})
#   3. If empty (key not found or no rules) → prints "No DQ rules configured" and skips.
#   4. For each column_name in source_rules:
#      a. Checks col_exists = column_name in df.columns
#      b. Evaluates each rule_type (mandatory, allowed_values, value_range, unique)
#      c. Prints result row + appends to res["dq_results"]
#      d. Increments dq_pass_count or dq_fail_count
#   5. dq_pass_count / dq_fail_count feed into Step 9 scoring.
#
# HOW FAILED RULES ARE REPORTED
# ─────────────────────────────────────────────────────────────────────────────
# Console: tabular row with column name, rule type, expected value, actual value,
#          severity icon, and PASS/FAIL status.
# CSV:     data_quality_assessment.csv — one row per rule per source.
# Score:   CRITICAL fails reduce readiness score; source may drop to NOT READY.
# COLUMN MISSING: if a column declared in DQ rules is absent from the DataFrame,
#                 the rule is evaluated as FAIL with status "COLUMN MISSING".
#                 This catches schema drift early.
#
# ─────────────────────────────────────────────────────────────────────────────
# GENERIC vs SOURCE-SPECIFIC RULES
# ─────────────────────────────────────────────────────────────────────────────
# Generic rules (apply to any source that has the column):
#   - mandatory: true on primary key columns (UPC, SKU, FECHA, etc.)
#   - value_range on numeric volumes (min: 0 guards against accidental negatives)
#
# Source-specific rules:
#   - allowed_values: constrain domain-specific enumerations (CANAL, FORMAT, etc.)
#     that are only meaningful in a particular source's context.
#   - value_range with business-domain bounds (e.g. MARKET_SHARE max: 100)
#   - unique: only where a column is expected to be a natural PK (e.g. DATE_ID)
#
# ─────────────────────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────────────────────
# DATA_MKT_ON — Investment / Marketing Online (VW_MKT_ECOMM)
# Key matches: SOURCES["DATA_MKT_ON"] in 00b_snowflake_discovery.py
# ─────────────────────────────────────────────────────────────────────────────
DATA_MKT_ON:
  MARCA:
    mandatory: true
    severity: CRITICAL
    description: "Brand — must always be populated. Primary business dimension and
      fallback join key when UPC is null."

  FECHA:
    mandatory: true
    severity: CRITICAL
    description: "Transaction/campaign date — required for all temporal joins and
      Gap Detection (Step 5)."

  ANIO:
    mandatory: true
    severity: HIGH
    description: "Year partition key — used as a Snowflake partition pruning key.
      Must equal YEAR(FECHA). Mismatch indicates a data pipeline bug."

  INVERSION_REAL:
    mandatory: false
    severity: MEDIUM
    value_range:
      min: 0
      max: 500000000
    description: "Actual marketing spend in MXN. Must be non-negative. Values > 500M
      are suspect and should be investigated before MMM input."

  INVERSION_PRESUPUESTADA:
    mandatory: false
    severity: MEDIUM
    value_range:
      min: 0
      max: 500000000
    description: "Budgeted marketing spend in MXN. Must be non-negative."

  UPC:
    mandatory: false
    severity: LOW
    description: "UPC — expected to be ~94% null for brand-level eComm campaigns.
      Document this as a known pattern, not a defect."

  CADENA:
    mandatory: false
    severity: MEDIUM
    description: "Retailer chain — expected for channel-level investment breakdowns.
      Not always present for digital / programmatic campaigns."

  CANAL:
    mandatory: false
    severity: MEDIUM
    allowed_values:
      - "ECOMMERCE"
      - "MODERN_TRADE"
      - "TRADITIONAL_TRADE"
      - "DIGITAL"
      - "OOH"
      - "TV"
      - "RADIO"
      - "PRINT"
      - "OTHER"
    description: "Marketing channel. Must be a recognized value. Add new values
      here (not in the notebook) if the business adds channels."

  CAMPANA:
    mandatory: false
    severity: LOW
    description: "Campaign name — informational. Used for domain profiling (Step 3)
      and campaign-level investment analysis."

  MEDIO:
    mandatory: false
    severity: LOW
    description: "Media type. Used as a grain dimension. Profiled in Step 3."

  PLATAFORMA:
    mandatory: false
    severity: LOW
    description: "Digital platform (e.g. FACEBOOK, GOOGLE). Sub-dimension of MEDIO."

  OBJETIVO:
    mandatory: false
    severity: LOW
    description: "Funnel objective (AWARENESS, CONSIDERATION, CONVERSION, RETENTION).
      Profiled in Step 3."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_MKT_OFF — Investment / Marketing Offline (FACT_MEDIA_OFF)
# Key matches: SOURCES["DATA_MKT_OFF"] in 00b_snowflake_discovery.py
# Note: Share rules with DATA_MKT_ON where applicable. Keep separate blocks
#       to allow source-specific overrides in future.
# ─────────────────────────────────────────────────────────────────────────────
DATA_MKT_OFF:
  MARCA:
    mandatory: true
    severity: CRITICAL
    description: "Brand — must always be populated for offline investment."

  FECHA:
    mandatory: true
    severity: CRITICAL
    description: "Campaign/flight date — required for temporal joins."

  ANIO:
    mandatory: true
    severity: HIGH
    description: "Year partition key — must equal YEAR(FECHA)."

  INVERSION_REAL:
    mandatory: false
    severity: MEDIUM
    value_range:
      min: 0
      max: 500000000
    description: "Actual offline investment in MXN."

  INVERSION_PRESUPUESTADA:
    mandatory: false
    severity: MEDIUM
    value_range:
      min: 0
      max: 500000000
    description: "Budgeted offline investment in MXN."

  CANAL:
    mandatory: false
    severity: MEDIUM
    allowed_values:
      - "TV"
      - "RADIO"
      - "PRINT"
      - "OOH"
      - "MODERN_TRADE"
      - "TRADITIONAL_TRADE"
      - "OTHER"
    description: "Offline channel. Different allowed_values set from DATA_MKT_ON."

  CAMPANA:
    mandatory: false
    severity: LOW
    description: "Campaign name — informational."

  MEDIO:
    mandatory: false
    severity: LOW
    description: "Offline media type."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_SELL_OUT — Point-of-Sale / Consumer Sales
# Key matches: SOURCES["DATA_SELL_OUT"] in 00b_snowflake_discovery.py
# ─────────────────────────────────────────────────────────────────────────────
DATA_SELL_OUT:
  UPC:
    mandatory: true
    severity: CRITICAL
    description: "Product UPC — primary join key to product dimension and to
      DATA_SELL_IN (via homologation). 0% null required."

  CHAIN:
    mandatory: true
    severity: CRITICAL
    description: "Retailer chain — required for customer dimension join.
      Must be homologated to CADENA in DATA_MKT / DATA_WASTE."

  DAY:
    mandatory: true
    severity: CRITICAL
    description: "Transaction day as a proper DATE — comes from V_D_PERIOD join.
      Required for temporal gap detection (Step 5)."

  VOL_SELL_OUT:
    mandatory: false
    severity: HIGH
    value_range:
      min: 0
      max: 50000000
    description: "Consumer sales volume in category-specific units. Must be
      non-negative. Negatives indicate a data pipeline error."

  PCS_SELL_OUT:
    mandatory: false
    severity: HIGH
    value_range:
      min: 0
      max: 50000000
    description: "Consumer sales in pieces. Must be non-negative."

  AMOUNT_SELL_OUT:
    mandatory: false
    severity: MEDIUM
    value_range:
      min: 0
      max: 5000000000
    description: "Consumer sales revenue in MXN. Must be non-negative."

  SUBCHAIN:
    mandatory: false
    severity: MEDIUM
    description: "Sub-chain / banner — used for granular retail analytics."

  FORMAT:
    mandatory: false
    severity: MEDIUM
    allowed_values:
      - "HYPERMARKET"
      - "SUPERMARKET"
      - "CONVENIENCE"
      - "WHOLESALE"
      - "DRUGSTORE"
      - "ONLINE"
      - "OTHER"
    description: "Store format. Must be a recognized value for channel segmentation."

  CBU_ID:
    mandatory: true
    severity: HIGH
    description: "Consumer Business Unit ID — used as a grain column and join key
      to the CBU catalog."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_SELL_IN — Factory / Distributor Shipments
# Key matches: SOURCES["DATA_SELL_IN"] in 00b_snowflake_discovery.py
# Status: source is currently None — rules are pre-populated for when the
#         SQL query is added.
# ─────────────────────────────────────────────────────────────────────────────
DATA_SELL_IN:
  SKU:
    mandatory: true
    severity: CRITICAL
    description: "SKU — primary product join key for sell-in. Must match
      Danone product master."

  INT_ID:
    mandatory: false
    severity: HIGH
    description: "Internal Danone product ID — bridge key between ERP and UPC.
      Allows joining Sell-In to Sell-Out via product master homologation."

  CADENA:
    mandatory: true
    severity: CRITICAL
    description: "Customer/chain — required for all customer-level sell-in analytics.
      Must be homologated to CHAIN in DATA_SELL_OUT."

  FECHA:
    mandatory: true
    severity: CRITICAL
    description: "Shipment date — required for temporal alignment with Sell-Out
      and Waste."

  UNIDADES:
    mandatory: false
    severity: HIGH
    value_range:
      min: 0
      max: 10000000
    description: "Shipped units. Must be non-negative (negatives indicate returns
      — document as known if returns are expected in this table)."

  MONTO:
    mandatory: false
    severity: HIGH
    value_range:
      min: -1000000
      max: 100000000
    description: "Invoice amount in MXN. Negatives are allowed for credit notes
      and returns. Values outside range are suspect."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_WASTE — Waste / Merma
# Key matches: SOURCES["DATA_WASTE"] in 00b_snowflake_discovery.py
# Note: These rules are configured based on expected VW_WASTE schema.
#       Run Step 2 first to verify actual column names.
# ─────────────────────────────────────────────────────────────────────────────
DATA_WASTE:
  SKU:
    mandatory: true
    severity: CRITICAL
    description: "SKU identifier — required for product-level waste analytics
      and join to DATA_SELL_IN."

  CADENA:
    mandatory: true
    severity: CRITICAL
    description: "Customer chain — required for waste by retailer analytics."

  MARCA:
    mandatory: true
    severity: HIGH
    description: "Brand — join key to brand dimension. Used for brand-level
      waste rate calculation."

  FECHA:
    mandatory: true
    severity: CRITICAL
    description: "Waste date — required for temporal alignment with Sell-In."

  UNIDADES_MERMA:
    mandatory: false
    severity: HIGH
    value_range:
      min: 0
      max: 1000000
    description: "Waste units. Must be non-negative. Zero is valid (no waste).
      Values > 1M are suspect — investigate before using in the waste risk model."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_FORECAST — Demand Forecast
# Source: currently None — rules pre-populated.
# ─────────────────────────────────────────────────────────────────────────────
DATA_FORECAST:
  SKU:
    mandatory: true
    severity: CRITICAL
    description: "SKU — must match sell-in SKU universe. Unmatched SKUs produce
      orphan forecast rows."

  CADENA:
    mandatory: false
    severity: HIGH
    description: "Customer chain forecast target. May be at aggregated level."

  FECHA:
    mandatory: true
    severity: CRITICAL
    description: "Forecast period date — required. Must align with sell-in periods."

  FORECAST_UNITS:
    mandatory: true
    severity: HIGH
    value_range:
      min: 0
      max: 50000000
    description: "Forecasted units — must be non-negative."

  VERSION:
    mandatory: false
    severity: MEDIUM
    description: "Forecast version identifier. Used to select the official version
      per pipeline_config.yaml: forecast.official_version_policy."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_NIELSEN — Nielsen Market Share
# Source: currently None — rules pre-populated.
# ─────────────────────────────────────────────────────────────────────────────
DATA_NIELSEN:
  CBU_CODE:
    mandatory: false
    severity: HIGH
    description: "Nielsen product code — must be homologated to internal SKU/UPC
      via homologation/ dict before joining to internal data."

  MARCA:
    mandatory: true
    severity: CRITICAL
    description: "Brand — primary dimension for market share analysis."

  CATEGORIA:
    mandatory: true
    severity: HIGH
    description: "Category — required for competitive benchmarking."

  YEAR_ID:
    mandatory: true
    severity: CRITICAL
    description: "Nielsen year period — required for temporal join.
      Must be mapped to calendar year for joins with other sources."

  MARKET_SHARE:
    mandatory: false
    severity: HIGH
    value_range:
      min: 0
      max: 100
    description: "Market share % — must be between 0 and 100. Values outside
      this range indicate a data extraction or transformation error."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_PRICE — Pricing
# Source: currently None — rules pre-populated.
# ─────────────────────────────────────────────────────────────────────────────
DATA_PRICE:
  UPC:
    mandatory: true
    severity: CRITICAL
    description: "UPC — product join key for pricing."

  CHAIN:
    mandatory: true
    severity: CRITICAL
    description: "Retailer chain — price varies by customer."

  FECHA:
    mandatory: true
    severity: CRITICAL
    description: "Effective price date."

  PRECIO:
    mandatory: true
    severity: CRITICAL
    value_range:
      min: 0.01
      max: 100000
    description: "Retail price in MXN — must be strictly positive. Zero is not
      a valid price (use null to indicate missing price)."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_PROMO — Promotions
# Source: currently None — rules pre-populated.
# ─────────────────────────────────────────────────────────────────────────────
DATA_PROMO:
  UPC:
    mandatory: false
    severity: HIGH
    description: "Product UPC for promotion — may be at brand level (null UPC
      = brand-level promotion)."

  CADENA:
    mandatory: true
    severity: CRITICAL
    description: "Retailer chain — promotions are customer-specific."

  FECHA_INICIO:
    mandatory: true
    severity: CRITICAL
    description: "Promotion start date."

  FECHA_FIN:
    mandatory: true
    severity: CRITICAL
    description: "Promotion end date — must be >= FECHA_INICIO.
      Note: cross-date validation (FECHA_FIN >= FECHA_INICIO) is not supported
      by the current rule engine — validate in Silver layer instead."

  DESCUENTO_PCT:
    mandatory: false
    severity: HIGH
    value_range:
      min: 0
      max: 100
    description: "Discount percentage — must be between 0 and 100."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_INVENTORY — Inventory / Stock
# Source: currently None — rules pre-populated.
# ─────────────────────────────────────────────────────────────────────────────
DATA_INVENTORY:
  SKU:
    mandatory: true
    severity: CRITICAL
    description: "SKU — product join key for inventory."

  FECHA:
    mandatory: true
    severity: CRITICAL
    description: "Inventory snapshot date."

  STOCK_UNITS:
    mandatory: false
    severity: HIGH
    value_range:
      min: 0
      max: 100000000
    description: "Stock on hand in units. Must be non-negative. Zero is valid
      (empty warehouse). Excludes transit stock by default
      (see pipeline_config.yaml: include_transit_stock: false)."


# ─────────────────────────────────────────────────────────────────────────────
# DATA_CALENDAR — Date Dimension
# Source: currently None — rules pre-populated.
# ─────────────────────────────────────────────────────────────────────────────
DATA_CALENDAR:
  DATE_ID:
    mandatory: true
    severity: CRITICAL
    unique: true
    description: "Primary key of the calendar — must be unique and never null."

  YEAR:
    mandatory: true
    severity: CRITICAL
    description: "Calendar year (integer)."

  MONTH:
    mandatory: true
    severity: CRITICAL
    value_range:
      min: 1
      max: 12
    description: "Calendar month (1-12)."

  WEEK:
    mandatory: false
    severity: HIGH
    value_range:
      min: 1
      max: 53
    description: "ISO week number (1-53)."

  IS_FISCAL:
    mandatory: false
    severity: LOW
    description: "Flag for fiscal vs calendar period alignment.
      See pipeline_config.yaml: fiscal_calendar for the fiscal year definition."
