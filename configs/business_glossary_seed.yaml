  # ── SELL_IN Derived ─────────────────────────────────────────────────────
  - column_name: VOLUMEN
    business_name: Sales Volume (Sell-In)
    definition: >
      Aggregated sell-in volume. NOT homologated across CBUs:
      WATERS = SUM(LITER) in liters; EDP = SUM(BIL_NET_KGR/1000) in metric tons.
      For cross-CBU comparison, use homologize_volume.py → VOLUMEN_HOMOLOGATED_KG.
    calculation_logic: "SUM(LITER) for WATERS CBU, SUM(BIL_NET_KGR / 1000) for EDP CBU"
    unit: "Liters (WATERS) / Metric Tons (EDP)"
    owner: "Commercial Operations"
    datasets: ["SELL_IN"]
    is_business_key: false
    dimension: null

  - column_name: VALOR
    business_name: Sales Value (Sell-In)
    definition: "Total sell-in monetary value (invoiced amount). SUM(BIL_INV) from VW_FACT_RNV."
