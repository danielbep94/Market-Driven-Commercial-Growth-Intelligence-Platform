# Pipeline Configuration — v2.2
# IMPORTANT: No secrets or credentials here. All credentials via Databricks secret scopes.
# Q8 resolved: Always ingest from data warehouse extract, NEVER directly from ERP.
# Q1 resolved: Fiscal calendar parameters configurable here — not hardcoded.
# Q4 resolved: Nielsen period type configurable here.

# --- Architecture guardrail ---
ingestion_source: "data_warehouse_extract"   # NEVER "erp_direct" — architectural rule

environments:
  dev:
    databricks_catalog: "mgi_dev"
    snowflake_database: "MGI_DEV"
    snowflake_schema_bronze: "BRONZE"
    snowflake_schema_silver: "SILVER"
    snowflake_schema_gold: "GOLD"
    snowflake_schema_mart: "MART"
    snowflake_schema_monitoring: "MONITORING"
    snowflake_schema_metadata: "METADATA"
  staging:
    databricks_catalog: "mgi_staging"
    snowflake_database: "MGI_STAGING"
    snowflake_schema_bronze: "BRONZE"
    snowflake_schema_silver: "SILVER"
    snowflake_schema_gold: "GOLD"
    snowflake_schema_mart: "MART"
    snowflake_schema_monitoring: "MONITORING"
    snowflake_schema_metadata: "METADATA"
  prod:
    databricks_catalog: "mgi_prod"
    snowflake_database: "MGI_PROD"
    snowflake_schema_bronze: "BRONZE"
    snowflake_schema_silver: "SILVER"
    snowflake_schema_gold: "GOLD"
    snowflake_schema_mart: "MART"
    snowflake_schema_monitoring: "MONITORING"
    snowflake_schema_metadata: "METADATA"

# --- Enterprise Metadata Catalog (Phase 1 output) ---
# Written by: notebooks/phase1_assessment/00c_enterprise_catalog_writer.py
# Storage:    Databricks Delta Lake (no Snowflake DDL permissions required)
#
# Option A — Unity Catalog (preferred if workspace has Unity Catalog):
#   delta_catalog: "mgi_dev"       # your Unity Catalog name
#   delta_schema:  "metadata"
#
# Option B — DBFS / Hive metastore (works in any Databricks workspace):
#   delta_catalog: null             # null = use Hive metastore
#   delta_schema:  "mgi_metadata"   # auto-created if missing
#
# CSVs are also written to docs/phase_outputs/ and committed to Git.
metadata_catalog:
  delta_catalog: null              # set to your Unity Catalog name if available
  delta_schema: "mgi_metadata"
  tables:
    - dataset_inventory
    - column_inventory
    - relationship_matrix
    - business_domain_profile
    - data_quality_assessment
    - grain_assessment
    - dimension_candidates
    - join_validation_report
    - business_glossary
    - enterprise_readiness_scorecard
  refresh_mode: "overwrite"        # each run replaces previous results
  run_after: "00b_snowflake_discovery"
  snowflake_ddl_required: false    # ← no CREATE SCHEMA needed


# --- Q1: Fiscal Calendar (confirmed with Finance in Phase 0) ---
# If fiscal = Gregorian, set fiscal_offset_weeks: 0 and fiscal_year_start_month: 1
fiscal_calendar:
  fiscal_year_start_month: 1       # [CONFIRM WITH FINANCE] 1 = January, 4 = April, etc.
  fiscal_offset_weeks: 0           # [CONFIRM WITH FINANCE] 0 = no offset from Gregorian
  fiscal_period_type: "monthly"    # monthly | 4-weekly | 13-period

# --- Q4: Nielsen cadence ---
nielsen:
  period_type: "4-weekly"          # [CONFIRM WITH MARKET INTELLIGENCE] monthly | 4-weekly | period-based
  lag_warning_threshold_weeks: 6   # Moved to dq_thresholds.yaml — kept here as reference only

# --- Forecast version policy (blocker decision) ---
forecast:
  official_version_policy: "period_close_frozen"
  # Options: "period_close_frozen" (recommended) | "most_recent_snapshot"
  # Rationale: comparing a mid-week revision against actuals inflates accuracy.
  # [CONFIRM WITH DEMAND PLANNING BEFORE PHASE 3]

pipeline:
  schedule: "0 2 * * 1"            # Every Monday at 2:00 AM UTC
  retry_attempts: 3
  retry_delay_minutes: 15
  alert_email: "[TBD — set in Phase 0]"
  powerbi_connection: "snowflake_only"  # Reminder: Power BI never reads from Databricks

sources:
  sell_in:
    semantic_key: "SELL_IN"
    snowflake_db: "PRD_MEX"
    snowflake_schema: "MEX_DSP_OTC"
    source_tables:
      - PRD_MEX.MEX_DSP_OTC.VW_D_CUSTOMER_DICTONARY
      - PRD_MEX.MEX_DSP_OTC.VW_FACT_RNV
      - PRD_MEX.MEX_DSP_OTC.V_D_CLIENT
      - PRD_MEX.MEX_DSP_OTC.V_D_PERIOD
      - PRD_MEX.MEX_DSP_OTC.V_D_ITEM
    extract_type: "data_warehouse"
    expected_delivery_day: "sunday"
    expected_delivery_hour: 23
    min_row_count_pct_vs_prior_week: 0.80
  sell_out:
    semantic_key: "SELL_OUT"
    snowflake_db: "PRD_MDP"
    snowflake_schema: "MDP_DSP"
    source_tables:
      - PRD_MDP.MDP_DSP.VW_FACT_SELL_OUT
      - PRD_MDP.MDP_DWH.V_D_PERIOD
      - PRD_MDP.MDP_DSP.VW_D_STORE_RM
      - PRD_MDP.MDP_DSP.VW_D_PRODUCT_RM
    extract_type: "data_warehouse"
    expected_delivery_day: "sunday"
    expected_delivery_hour: 23
    min_row_count_pct_vs_prior_week: 0.75
  waste:
    semantic_key: "DATA_WASTE"
    snowflake_db: "PRD_MDP"
    snowflake_schema: "MDP_STG"
    source_tables:
      - PRD_MDP.MDP_STG.VW_WASTE
    extract_type: "data_warehouse"
    expected_delivery_day: "monday"
    expected_delivery_hour: 2
    min_row_count_pct_vs_prior_week: 0.60
  investment:
    semantic_key:
      - "DATA_MKT_OFF"
      - "DATA_MKT_ON"
    snowflake_db: "PRD_MDP"
    snowflake_schema:
      off: "MDP_STG"
      on: "MDP_DSP"
    source_tables:
      - PRD_MDP.MDP_STG.FACT_MEDIA_OFF
      - PRD_MDP.MDP_DSP.VW_MKT_ECOMM
    extract_type: "data_warehouse"
    expected_delivery_day: "first_monday_of_month"
    expected_delivery_hour: 6
    min_row_count_pct_vs_prior_period: 0.70
  forecast:
    semantic_key: "DATA_DANONE_IBP"
    snowflake_db: "PRD_MDP"
    snowflake_schema: "MDP_DSP"
    source_tables:
      - PRD_MDP.MDP_DSP.VW_FACT_DANONE_IBP
    extract_type: "data_warehouse"
    expected_delivery_day: "sunday"
    expected_delivery_hour: 20
    min_row_count_pct_vs_prior_week: 0.80
  nielsen:
    semantic_key:
      - "DATA_EDP_YOG_GEL_RETAIL_SCANTRACK_NIELSEN"
      - "DATA_PB_SCANTRACK_NIELSEN"
      - "DATA_WATER_RETAIL_NIELSEN"
      - "DATA_WATER_SCANTRACK_NIELSEN"
    snowflake_db: "PRD_MEX"
    snowflake_schema: "MEX_DSP_DPH_MKT"
    source_tables:
      # EDP Yogurt / Gelatinas
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IR_YOG_GEL_MT_NLSN_AGG_DATA_PVT
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IR_YOG_GEL_MT_NLSN_MKT_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IR_YOG_GEL_MT_NLSN_PER_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IR_YOG_GEL_MT_NLSN_FACT_REF
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IR_YOG_GEL_MT_NLSN_PROD_DIM
      # Plant Based / Scantrack
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_SUST_LECHE_ST_NLSN_AGG_DATA_PVT
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_SUST_LECHE_ST_NLSN_PROD_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_SUST_LECHE_ST_NLSN_MKT_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_SUST_LECHE_ST_NLSN_PER_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_SUST_LECHE_ST_NLSN_FACT_REF
      # Water Retail
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_RT_NLSN_AGG_DATA_PVT
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_RT_NLSN_MKT_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_RT_NLSN_PER_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_RT_NLSN_FACT_REF
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_RT_NLSN_PROD_DIM
      # Water Scantrack
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_ST_NLSN_AGG_DATA_PVT
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_ST_NLSN_MKT_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_ST_NLSN_PER_DIM
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_ST_NLSN_FACT_REF
      - PRD_MEX.MEX_DSP_DPH_MKT.VW_IND_AGUA_BNF_ST_NLSN_PROD_DIM
    extract_type: "data_warehouse"
    expected_delivery_day: "TBD_confirm_with_market_intelligence"
    expected_delivery_hour: 0
    min_row_count_pct_vs_prior_period: 0.85
  inventory:
    semantic_key: "SELL_OUT"   # Inventory metrics (VOL_INV, PCS_INV) live inside the SELL_OUT semantic layer
    snowflake_db: "PRD_MDP"
    snowflake_schema: "MDP_DSP"
    source_tables:
      - PRD_MDP.MDP_DSP.VW_FACT_SELL_OUT
      - PRD_MDP.MDP_DWH.V_D_PERIOD
      - PRD_MDP.MDP_DSP.VW_D_STORE_RM
      - PRD_MDP.MDP_DSP.VW_D_PRODUCT_RM
    extract_type: "data_warehouse"
    stock_type_default: "IN_WAREHOUSE"  # Q5 resolved: exclude transit stock by default
    include_transit_stock: false

