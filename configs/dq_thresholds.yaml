# Data Quality Thresholds — v2.2
# All threshold values live HERE — never hardcoded in notebooks or Power BI.
# Changing a threshold requires only updating this file + a new pipeline run.

global:
  null_rate_error_threshold: 0.05          # > 5% nulls in a NOT-NULL field = ERROR
  null_rate_warning_threshold: 0.01        # > 1% nulls = WARNING
  row_count_drop_error_threshold: 0.20     # > 20% drop vs. prior period = ERROR
  row_count_drop_warning_threshold: 0.10   # > 10% drop = WARNING

# --- Nielsen lag threshold ---
# Used by: vw_nielsen_lag_status (Snowflake view) → Power BI lag banner on Page 1 + Page 6
# Rule: if most recent Nielsen period is > nielsen_lag_warning_weeks older than
#       the internal data period being displayed, show ⚠ banner.
nielsen_lag_warning_weeks: 6               # Configurable — change here only

# --- GQS stress test threshold ---
# Used by: kpi_gqs_stress_test.py (Phase 4)
# If portfolio IQR of Growth Quality Score < this value after Phase 4,
# weights must be recalibrated before Phase 5 begins.
gqs_iqr_minimum_threshold: 15             # Points — if IQR < 15, recalibrate weights

# --- Sell-out coverage threshold ---
sell_out_coverage_low_threshold: 0.70     # Below this → confidence_level = LOW
sell_out_coverage_medium_threshold: 0.85  # Below this → confidence_level = MEDIUM

# --- Per-source thresholds ---
sell_in:
  # Updated per Q10: SKU-level grain approved. MAT_IDT exposed as SKU.
  # CADENA→CLIENTE_ID: SELL_IN uses customer identity, not retail chain.
  required_not_null: ["FECHA", "CLIENTE_ID", "MARCA", "SKU", "VOLUMEN"]
  value_range:
    VOLUMEN: {min: 0, max: 10000000}
    VALOR: {min: -1000000, max: 100000000}

sell_out:
  # Updated per Q9: store/UPC-level grain approved.
  # STORE_ID, UPC, SUBCHAIN added; GROUP BY removed (fact-level rows).
  required_not_null: ["FECHA", "STORE_ID", "UPC", "CADENA", "FORMATO_CADENA", "MARCA", "VOL_SELL_OUT"]
  value_range:
    VOL_SELL_OUT: {min: 0, max: 1000000}
    PCS_SELL_OUT: {min: 0, max: 1000000}
    AMOUNT_SELL_OUT: {min: 0, max: 100000000}
    VOL_INV: {min: 0, max: 1000000}
    PCS_INV: {min: 0, max: 1000000}

waste:
  # WASTE_AMOUNT and WASTE_KG are COALESCE'd to 0 in layout SQL — no nulls in output.
  # Negative values are valid (waste adjustments/credits, confirmed by business).
  # SKU has 0% nulls (validated V4).
  required_not_null: ["CADENA", "MARCA", "FECHA", "SKU", "WASTE_AMOUNT", "WASTE_KG"]
  value_range:
    WASTE_AMOUNT: {min: -100000000, max: 100000000}  # negatives allowed (adjustments)
    WASTE_KG: {min: -1000000, max: 10000000}          # negatives allowed (adjustments)
  # Anomaly: waste_amount > sell_in_valor in same period → flag is_anomaly = TRUE, do not drop

# Investment thresholds split by source (V5 validation showed different null profiles)
investment_mkt_on:
  # MKT_ON (VW_MKT_ECOMM): 46K rows. SOPORTE_PLATAFORMA 22.9% null — not required.
  # CAMPANA 0.1% null — acceptable. INVERSION_REAL 3.2% null — keep required.
  required_not_null: ["MEDIO", "MARCA", "FECHA", "INVERSION_REAL"]
  value_range:
    INVERSION_REAL: {min: 0, max: 500000000}

investment_mkt_off:
  # MKT_OFF (FACT_MEDIA_OFF): 522K rows. Includes competitor brands.
  # CAMPANA 75.9% null — NOT required (many non-campaign line items).
  # INVERSION_REAL 42% null — NOT required (competitor rows may lack amounts).
  # CAMPANA nulls allowed for non-Danone brands.
  required_not_null: ["MEDIO", "MARCA", "FECHA"]
  value_range:
    INVERSION_REAL: {min: 0, max: 500000000}

# --- Waste risk thresholds ---
waste_risk:
  high_threshold: 5.0    # % waste rate — above this = HIGH risk territory
  low_threshold: 2.0     # % waste rate — below this = LOW risk territory

# --- Model performance alert thresholds ---
model_performance:
  wape_degradation_alert_pp: 5.0         # Alert if WAPE degrades > 5 percentage points
  recall_drop_alert: 0.10                # Alert if recall drops > 10pp (Waste Risk model)
