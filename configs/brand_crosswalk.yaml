# Brand Crosswalk — configs/brand_crosswalk.yaml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE  : Canonical brand name mapping across all 10 data sources
# RULE     : Both MARCA (raw) and MARCA_STD (canonical) are kept in all layouts
# DECISIONS (locked — Phase B/C):
#   - Sub-brands stay separate (BONAFONT KIDS ≠ BONAFONT)
#   - Competitors in MKT_OFF keep their own canonical name
#   - SELL_IN merchandise → _MERCHANDISE
#   - WASTE anomaly brands (0, DAIRY, MULTI, etc.) → _UNKNOWN
#   - Canonical for Hersheys  : HERSHEYS
#   - Canonical for Bonafont Té: BONAFONT TE
#   - INVERSION_REAL null for non-Danone MKT_OFF rows is allowed (confirmed)
#   - CAMPANA null for non-Danone MKT_OFF rows is allowed (confirmed)
# ─────────────────────────────────────────────────────────────────────────────
# C.5 UPDATE — 2026-06-22
#   V9  confirmed brand lists from all 4 Nielsen sources
#   V10 confirmed SELL_IN gaps (mixed-case variants, DAIRY DANONE MEXICO, etc.)
#   V11 confirmed 19 MATCHED + 12 expected NO_IBP_MATCH brands
# ─────────────────────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────────
# FORMAT: each entry = canonical_name → list of raw variants (any source)
#         Matching is TRIM + UPPER before comparison in SQL.
# ─────────────────────────────────────────────────────────────────────────────

