# =============================================================================
# Derived Column Crosswalk — SQL Alias → Source Column Traceability
# =============================================================================
# Maps each SQL-computed/aliased column in the semantic layouts back to its
# source table and column in Snowflake. This enables:
#   1. Precise type resolution (from INFORMATION_SCHEMA, not inference)
#   2. Impact analysis when source columns change
#   3. Full data lineage traceability
#
# type_source: how the output type is determined
#   - "direct_alias"  → same type as source column (SELECT src AS alias)
#   - "cast"          → explicit cast (TO_DATE, TRY_TO_NUMBER, etc.)
#   - "aggregation"   → SUM/AVG/COUNT of source column
#   - "case_expr"     → CASE WHEN logic (output type = TEXT unless numeric)
#   - "constant"      → hardcoded literal value
#
# Created: 2026-06-21
# =============================================================================

