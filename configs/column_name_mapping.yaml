        note: "Silver/Gold layer alias. Will be updated to CANAL."

  - canonical: GRAN_CANAL
    dimension: DIM_CUSTOMER
    rationale: "Used in IBP only. Grand channel. Not in glossary — Phase 3a target."
    aliases: []

  - canonical: REGION
    dimension: DIM_CUSTOMER
    rationale: "Used in SELL_IN. Not in glossary — Phase 3a target."
    aliases: []

  - canonical: ID_CEDIS
    dimension: DIM_CUSTOMER
    rationale: "Used in SELL_IN. Distribution center code. Not in glossary — Phase 3a target."
    aliases: []

  - canonical: CEDIS_DSC
    dimension: DIM_CUSTOMER
