# =============================================================================
# Column Name Mapping — Canonical Name Crosswalk
# =============================================================================
#
# This file establishes ONE canonical name for every logical column concept
# across the entire platform.  All downstream consumers (semantic_registry.yaml,
# model_config.yaml, dq_rules_catalog.yaml, dq_thresholds.yaml) MUST reference
# the canonical name.
#
# Decision criteria (applied in order):
#   1. Use the name from business_glossary_seed.yaml if it exists
#      (enterprise-approved term).
#   2. If not in glossary, use the name most prevalent across sources.
#   3. If prevalence is tied, prefer the name that serves as the natural key
#      (no resolution table required) over one needing a crosswalk.
#   4. Prefer UPPERCASE (matches Snowflake default and glossary convention).
#   5. snake_case aliases in dq_thresholds.yaml will be updated to match.
#
# Source inventory used to build this file:
#   - SEMANTIC_LAYOUTS/ (10 files, ~107 unique columns)
#   - configs/business_glossary_seed.yaml (31 entries)
#   - configs/dq_rules_catalog.yaml (~55 column references across 10 datasets)
#   - configs/dq_thresholds.yaml (per-source required_not_null fields)
#   - configs/model_config.yaml (feature references)
#
# Generated: 2026-06-20
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# DIM_DATE — Time / Date columns
# ─────────────────────────────────────────────────────────────────────────────
column_mappings:

  - canonical: FECHA
    dimension: DIM_DATE
    rationale: >
      Glossary-defined as 'Transaction Date', used by 8 of 10 semantic layout
      sources (EDP_NIELSEN, MKT_OFF, MKT_ON, PB_NEILSEN, SELL_IN, SELL_OUT,
      WASTE, WATER_RETAIL). Clear winner on both enterprise approval and
      prevalence.
    aliases:
      - name: DAY_ID
        sources: [DATA_SELL_OUT]
        note: "Integer format YYYYMMDD in dq_rules. Requires CAST to DATE."
      - name: PER_DATE
        sources: [DATA_WATER_SCANTRACK_NIELSEN]
        note: "Monthly Nielsen period date — DATE_TRUNC from period_ending_datetime."
      - name: CICLO
        sources: [DATA_DANONE_IBP]
        note: "Planning cycle — not a strict calendar date. IBP-specific."
      - name: ship_date
        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Silver/Gold layer alias. Will be updated to FECHA."
      - name: sell_out_week
        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Silver/Gold weekly aggregation. Will be updated to FECHA."
      - name: waste_date
        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Silver/Gold layer alias. Will be updated to FECHA."
      - name: period_month
        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Investment monthly period. Will be updated to FECHA."
      - name: FECHA_INICIO
        sources: [DATA_PROMO]
        note: "Promo start date — separate concept, NOT an alias. Keep distinct."
        is_alias: false
      - name: FECHA_FIN
        sources: [DATA_PROMO]
        note: "Promo end date — separate concept, NOT an alias. Keep distinct."
        is_alias: false

  - canonical: ANIO
    dimension: DIM_DATE
    rationale: >
      Glossary-defined as 'Year'. Used by DATA_MKT_ON, DATA_MKT_OFF, and DATA_SELL_IN.
    aliases:
      - name: YEAR
        sources: [DATA_CALENDAR]
        note: "English equivalent in calendar table."
      - name: YEAR_ID
        sources: [DATA_NIELSEN]
        note: "Nielsen-specific year identifier."

  - canonical: MES
    dimension: DIM_DATE
    rationale: >
      Glossary-defined as 'Month'. Used by DATA_WASTE, DATA_SELL_IN.
    aliases:
      - name: MONTH
        sources: [DATA_CALENDAR]
        note: "English equivalent in calendar table."

  # Calendar-only columns (not in glossary yet — Phase 3a targets)
  - canonical: DATE_ID
    dimension: DIM_DATE
    rationale: "Used only in DATA_CALENDAR. No alias conflicts."
    aliases: []

  - canonical: WEEK
    dimension: DIM_DATE
    rationale: "Used only in DATA_CALENDAR. No alias conflicts."
    aliases: []

  - canonical: IS_FISCAL
    dimension: DIM_DATE
    rationale: "Used only in DATA_CALENDAR. No alias conflicts."
    aliases: []


# ─────────────────────────────────────────────────────────────────────────────
# DIM_PRODUCT — Product identification
# ─────────────────────────────────────────────────────────────────────────────

  - canonical: SKU
    dimension: DIM_PRODUCT
    rationale: >
      Both SKU and UPC are glossary-defined, each appearing in exactly
      4 data sources — prevalence is tied at 4-to-4.
      SKU is chosen as canonical because it is the internal natural key
      that requires no resolution table. UPC, INT_ID, and CBU_CODE all
      require a crosswalk join back to SKU via homologation.product_crosswalk.
      This makes SKU the convergence point for cross-source product joins.
    aliases:
      - name: UPC
        sources: [DATA_MKT_ON, DATA_MKT_OFF, DATA_SELL_OUT, DATA_PRICE, DATA_PROMO]
        note: "External barcode — needs crosswalk to SKU."
      - name: INT_ID
        sources: [DATA_SELL_IN]
        note: "Internal product ID — needs crosswalk to SKU."
      - name: CBU_CODE
        sources: [DATA_NIELSEN]
        note: "Consumer Business Unit code — needs crosswalk to SKU."
      - name: sku_id
        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Silver/Gold layer alias. Will be updated to SKU."

  - canonical: DESCRIPCION
    dimension: DIM_PRODUCT
    rationale: "Glossary-defined as 'Product Description'. Used across ALL sources."
    aliases: []

  - canonical: CBU
    dimension: DIM_PRODUCT
    rationale: >
      Used in SELL_IN as a grain column (WATERS vs EDP).
      Distinct from CBU_CODE (product key). No alias conflicts.
    aliases: []


# ─────────────────────────────────────────────────────────────────────────────
# DIM_BRAND — Brand / Category / Subcategory
# ─────────────────────────────────────────────────────────────────────────────

  - canonical: MARCA
    dimension: DIM_BRAND
    rationale: >
      Glossary-defined as 'Brand'. Used by 5 semantic layout sources
      (MKT_OFF, MKT_ON, SELL_IN, SELL_OUT, WASTE) plus DQ rules on
      DATA_MKT_ON, DATA_MKT_OFF, DATA_WASTE, DATA_NIELSEN. Clear winner.
    aliases:
      - name: ITM_UNIF_BRND
        sources: [DATA_EDP_YOG_GEL_RETAIL_SCANTRACK_NIELSEN, DATA_WATER_SCANTRACK_NIELSEN]
        note: "Nielsen internal brand code — maps to MARCA at silver layer."
      - name: ITM_UNIF_BRAND
        sources: [DATA_PB_SCANTRACK_NIELSEN, DATA_WATER_RETAIL_NIELSEN, DATA_WATER_SCANTRACK_NIELSEN]
        note: "Nielsen variant (BRAND vs BRND)."
      - name: ITM_UNIF_BRAND_DAN
        sources: [DATA_WATER_RETAIL_NIELSEN, DATA_WATER_SCANTRACK_NIELSEN]
        note: "Danone-specific brand mapping derived in SQL."
      - name: ITM_UNIF_BRND_DAN
        sources: [DATA_WATER_SCANTRACK_NIELSEN]
        note: "Scantrack variant of Danone brand mapping."
      - name: brand_id
        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Silver/Gold layer alias. Will be updated to MARCA."

  - canonical: CATEGORIA
    dimension: DIM_BRAND
    rationale: >
      Glossary-defined as 'Product Category'. Used by IBP, MKT_OFF, MKT_ON,
      and DATA_NIELSEN DQ rules.
    aliases: []

  - canonical: SUBCATEGORIA
    dimension: DIM_BRAND
    rationale: >
      Glossary-defined as 'Product Subcategory'. Used in DATA_MKT_OFF and
      PB_SCANTRACK (constant = 'SUSTITUTOS DE LECHE').
    aliases: []


# ─────────────────────────────────────────────────────────────────────────────
# DIM_CUSTOMER — Customer / Chain / Store
# ─────────────────────────────────────────────────────────────────────────────

  - canonical: CADENA
    dimension: DIM_CUSTOMER
    rationale: >
      Glossary-defined as 'Retail Chain (Spanish)'. Used by 4 semantic layout
      sources (IBP, MKT_ON, SELL_OUT, WASTE) plus DQ rules on DATA_MKT_ON,
      DATA_MKT_OFF, DATA_WASTE, DATA_SELL_IN, DATA_PROMO. CHAIN used only by DATA_SELL_OUT
      and DATA_PRICE (2 sources in DQ rules). CADENA wins on glossary presence
      plus 4-vs-2 prevalence in layouts.
    aliases:
      - name: CHAIN
        sources: [DATA_SELL_OUT, DATA_PRICE]
        note: "English equivalent — homologation table exists."
      - name: customer_id
        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Silver/Gold layer alias. Will be updated to CADENA."

  - canonical: CLIENTE
    dimension: DIM_CUSTOMER
    rationale: >
      Used in SELL_IN only. Derived customer name from dictionary lookup.
      Not in glossary yet — Phase 3a target.
    aliases: []

  - canonical: CLIENTE_ID
    dimension: DIM_CUSTOMER
    rationale: >
      Used in SELL_IN only. Derived: CONCAT('0068'/'0049', customer_id).
      Not in glossary yet — Phase 3a target.
    aliases: []

  - canonical: SUBCHAIN
    dimension: DIM_CUSTOMER
    rationale: "Glossary-defined as 'Sub-Chain/Banner'. DATA_SELL_OUT only."
