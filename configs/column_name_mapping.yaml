        sources: [dq_thresholds.yaml]
        layer: silver
        note: "Silver/Gold layer alias for store identifier."

  - canonical: FORMATO_CADENA
    dimension: DIM_CUSTOMER
    rationale: "Used in SELL_OUT as chain format. Not in glossary yet — Phase 3a target."
    aliases: []

  - canonical: CANAL
    dimension: DIM_CUSTOMER
    rationale: >
      Glossary-defined as 'Trade Channel'. Used by IBP and WASTE.
      DQ rules allowed_values: ECOMMERCE, MODERN_TRADE, TRADITIONAL_TRADE,
      DIGITAL, OOH, TV, RADIO, PRINT, OTHER.
    aliases:
