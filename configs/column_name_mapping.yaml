# ─────────────────────────────────────────────────────────────────────────────
# Model feature names → semantic column mapping
# ─────────────────────────────────────────────────────────────────────────────
# These are NOT canonical column names — they are model-layer feature names
# that need to be traced back to semantic columns. Documented here for
# Phase 3b enrichment of model_config.yaml.

model_feature_mappings:
  demand_forecast:
    - feature: price
      semantic_column: PRECIO
      source: DATA_PRICE
    - feature: promo
      semantic_column: DESCUENTO_PCT
      source: DATA_PROMO
    - feature: market_share
      semantic_column: MARKET_SHARE
      source: DATA_NIELSEN

  investment_efficiency:
    - feature: hill_transformed_investment
      semantic_column: INVERSION_REAL
      source: DATA_MKT_ON, DATA_MKT_OFF
      note: "After adstock + Hill transform"
    - feature: promotion_active
      semantic_column: DESCUENTO_PCT
      source: DATA_PROMO
      note: "Binary flag derived from promo data"
    - feature: price_index_vs_category
      semantic_column: PRECIO
      source: DATA_PRICE, DATA_NIELSEN
    - feature: nielsen_weighted_distribution
      semantic_column: DIST_POND_REACH
      source: DATA_EDP_YOG_GEL_RETAIL_SCANTRACK_NIELSEN
    - feature: is_holiday
      semantic_column: IS_FISCAL
      source: DATA_CALENDAR
      note: "Derived from calendar table"
    - feature: sell_out_lag_4w
      semantic_column: VOL_SELL_OUT
      source: DATA_SELL_OUT
      note: "4-week lag"

  competitive_risk:
    - feature: share_loss_rate_13w
      semantic_column: MARKET_SHARE
      source: DATA_NIELSEN
    - feature: price_gap_widening
      semantic_column: PRECIO
      source: DATA_PRICE
    - feature: numeric_distribution_change_13w
      semantic_column: DIST_NUM
      source: DATA_NIELSEN
    - feature: weighted_distribution_change_13w
      semantic_column: DIST_POND_REACH
      source: DATA_NIELSEN

  waste_risk:
    - feature: forecast_accuracy
      semantic_column: FORECAST_UNITS
      source: DATA_FORECAST
    - feature: stock_cover
      semantic_column: STOCK_UNITS
      source: DATA_INVENTORY
