  - id: TD-004
    title: "NEILSEN folder naming — typo should be NIELSEN (Phase C known convention)"
    severity: LOW
    area: SEMANTIC_LAYOUTS
    deadline: "2027-Q1"
    description: >
      Two semantic layout folders contain a typo: NEILSEN instead of NIELSEN.
        SEMANTIC_LAYOUTS/PB_NEILSEN/         (correct: PB_NIELSEN)
        SEMANTIC_LAYOUTS/WATER_NEILSEN/      (correct: WATER_NIELSEN)
      The folder EDP_NIELSEN is spelled correctly.
      Renaming is deferred because it would require updating all path references
      in: semantic_registry.yaml, column_name_mapping.yaml, FOLDER_STRUCTURE.txt,
      and any Databricks notebook that uses %run or file paths.
      Current state is documented as a known naming convention — do not introduce
      additional files using the NEILSEN spelling.
    files:
      - SEMANTIC_LAYOUTS/PB_NEILSEN/PB_SCANTRACK.txt
      - SEMANTIC_LAYOUTS/WATER_NEILSEN/RETAIL_WATER.txt
      - SEMANTIC_LAYOUTS/WATER_NEILSEN/SCANTRACK_WATER.txt
    recommended_fix: >
      1. Create a dedicated cleanup branch.
      2. Use git mv to rename both directories (preserves git history).
      3. Update all references in: semantic_registry.yaml,
         column_name_mapping.yaml, FOLDER_STRUCTURE.txt, CONNECTION_ISSUES.txt,
         notebooks/validate_*.py (if they reference paths directly).
      4. Run build_registry.py to confirm 100% coverage after rename.
      5. Merge cleanup branch — single atomic commit.
    added: "2026-06-23"
    status: OPEN
    phase_c_note: >
      Identified during Phase C closure controls (2026-06-23).
      Deliberately deferred to avoid breaking live validation infrastructure.

  - id: TD-005
    title: "Phase D — Cross-source join validation (SELL_OUT × MKT, SELL_IN × IBP)"
    severity: MEDIUM
    area: VALIDATION
    deadline: "2026-Q3"
    description: >
      V12E validated EDP Nielsen × IBP join (11 matched Danone brands).
      The following cross-source joins are NOT yet validated and are required
      for Phase D analytics mart construction:
        1. SELL_OUT × MKT_ON   — on MARCA_STD + FECHA (month)
        2. SELL_OUT × MKT_OFF  — on MARCA_STD + FECHA (note: MKT_OFF includes competitors)
        3. SELL_OUT × WASTE    — on MARCA_STD + FECHA (Danone brands only)
        4. SELL_IN  × IBP      — on MARCA_STD + FECHA (volume vs plan)
        5. SELL_OUT × NIELSEN  — on MARCA_STD + FECHA (value share validation)
      Each join needs a validation query confirming: match rate, date grain
      alignment, and MARCA_STD coverage percentage.
    files:
      - notebooks/validate_nielsen_marca_std_v12.py
    recommended_fix: >
      Create notebooks/validate_cross_source_joins_phase_d.py with:
        V13A: SELL_OUT × MKT_ON join (MARCA_STD + FECHA)
        V13B: SELL_OUT × MKT_OFF join (Danone brands only)
        V13C: SELL_OUT × WASTE join
        V13D: SELL_IN × IBP join
        V13E: SELL_OUT × EDP Nielsen join (value vs share)
      Threshold: each join should resolve ≥ 80% of Danone SELL_OUT MARCA_STD
      values against the partner source.
    added: "2026-06-23"
    status: OPEN
    phase_c_note: >
      Captured during Phase C closure controls. V12E (EDP × IBP) is the only
      cross-source join validated. All others are Phase D work.

