  - id: TD-004
    title: "dq_thresholds.yaml uses snake_case Silver-layer names"
    severity: MEDIUM
    area: configs
    deadline: "2026-07-15"
    description: >
      dq_thresholds.yaml uses Silver/Gold-layer field names (sku_id,
      store_id, units_sold, ship_date, net_revenue) while all other configs
      use Bronze-layer/source UPPERCASE names (SKU, CHAIN, VOL_SELL_OUT,
      FECHA, MONTO). This naming mismatch causes confusion and prevents
      automated cross-config validation.
    files:
      - configs/dq_thresholds.yaml
    recommended_fix: >
      Phase 3e will update all field references to canonical UPPERCASE names
      from column_name_mapping.yaml, with a mapping comment explaining the
      Silver-layer equivalents.
    added: "2026-06-20"
    status: OPEN
